    <section class="container">
      <h1>Case Report Form</h1>
      <form id="myForm">
        <div class="report">
          <h2>Your Information</h2>
          <div class="report1">
            <div class="report2">
              <label for="name">Your Name</label>
              <input type="text" id="name" placeholder="Enter your name" />
            </div>
            <div class="report2">
              <label for="number">Phone Number</label>
              <input type="text" id="phone" placeholder="Enter your Phone Number" />
            </div>
            <div class="report2">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="Enter your Email" />
            </div>
          </div>
            <div class="report3">
              <h2>Location</h2><br/>
              <div class="report5">
              <div class="report2">
                <label for="Address">Street Address</label>
                <input type="text" id="address" placeholder="Enter your Address" />
              </div>
              <div class="report2">
                <label for="city">City</label>
                <input type="text" id="city" placeholder="Enter your city" />
              </div>
              <div class="report2">
                <label for="pincode">PinCode</label>
                <input type="text" id="pincode" placeholder="Enter your pincode" />
              </div>
              </div>
            </div>
          </div>
          <div class="report4">
            <h2>Case Details</h2>
            <div class="report5">
              <div class="report2">
                <label for="number">Number of Dogs</label>
                <input type="number" id="dogs" placeholder="Enter The number of dogs" />
              </div>
              <div class="report2">
                <label>Urgency Level</label>
                <input type="text" id="urgent" placeholder="Enter the urgency level" />
              </div>
              <div class="report2">
                <label>Detailed Description</label>
                <input type="text"id=description placeholder="Enter the description" />
              </div>
              <div class="report2">
                <label>Best time to visit</label>
                <input type="text" id="time" placeholder="Enter the time to visit" />
              </div>
            </div>
          </div>
          <button type="submit">Submit Report</button>

        </div>
      </form>
    </section>
    <footer class="footer">
        <div class="footer1">
