<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact page</title>
  <link rel="stylesheet" href="../styles/contact_ngo.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <nav class="nav_bar">
      <div class="logo">
        <img class="logo_img" src="../assets/Logo.png" alt="Logo Image" width="70px" height="70px" />
        <h2><a href="../index.html">Paw Care</a></h2>
      </div>
      <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <ul class="nav_link">
        <li><b><a href="../pages/ngoabout.html">About</a></b></li>
        <li><b><a href="../pages/registered_volunt.html">Registered Volunteer</a></b></li>
        <li><b><a href="../pages/report_case.html">Report Cases</a></b></li>
        <li><b><a href="../pages/completedcase.html">Completed Cases</a></b></li>
        <li><b><a href="../pages/contact_ngo.html">Contact</a></b></li>
      </ul>
    </nav>
  </header>
  <section class="big_box">
    <div class="box1">
      <h1>Contact Paw Care</h1><br />
      <div class="contact_img">
        <img src="../assets/contact1.jpg" alt="image" width="60px" height="60px" />
        <h2>Email </h2>
      </div>
      <p>Send Us a Detailed Message

        pawcare@gmail.com

        Response within 24 hours</p><br /><br />
      <div class="contact_img">
        <img src="../assets/contact2.jpg" alt="image" width="60px" height="60px" />
        <h2>Phone</h2>
      </div>
      <p>Speak directly with our team

        9091534580

        Mon-Fri, 9AM-6PM</p>
    </div>
    <div class="box2">
      <form id="contact_form">
        <label>Full Name </label><br /><br />
        <input type="text" name="user_name" placeholder="Enter your full name" required><br /><br />
        <label>Email Address </label><br /><br />
        <input type="email" name="user_email" placeholder="Enter your email" required><br /><br />
        <label>Phone Number</label><br /><br />
        <input type="tel" name="user_phone" placeholder="Enter your number"><br /><br />
        <label>City</label><br /><br />
        <input type="text" name="user_city" placeholder="Enter your city"><br /><br />
        <label>Subject </label><br /><br />
        <textarea name="subject" rows="1" placeholder="Enter the subject" required></textarea><br /><br />
        <label>Message </label><br /><br />
        <textarea name="message" rows="4" placeholder="Enter the message" required></textarea><br /><br />
        <button type="submit" class="submitbtn"> Send Message</button>
      </form>
    </div>
  </section>
  <footer class="footer">
    <div class="footer1">
      <p>2026 Paw Care!</p>
    </div>
  </footer>
  <script src="../js/contact_donation.js"></script>
  <script>
    function toggleMenu() {
      const navMenu = document.querySelector('.nav_link');
      navMenu.classList.toggle('active');
    }
  </script>
</body>

</html>
