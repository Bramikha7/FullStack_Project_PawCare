<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="stylesheet" href="../styles/adminlogin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div class="container">
      <nav>
        <h2 id="navlogo">Paw Care</h2>
        <div class="hamburger" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <ul class="navmenu">
          <!-- <li><a href="../index.html">Back to Home</a></li> -->
        </ul>
      </nav>
    </div>
  </header>
  <div class="container1">
    <img src="../assets/sign in.png" />
    <div class="label">
      <div class="label2">
        <h1>Login</h1>

        <form id="adminLoginForm">

          <label>Email</label><br />
          <input type="text" id="email" required placeholder="Enter your Email" /><br /><br />

          <label>Password</label><br />
          <input type="password" id="password" required placeholder="Enter your Password" /><br /><br />
          <button type="submit" class="back1">Login</button>
        </form>

      </div>
    </div>
  </div>
  <script>
    const adminLoginForm = document.getElementById("adminLoginForm");

    adminLoginForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const correctEmail = "admin@pawcare.com";
      const correctPassword = "adminpassword123";
      if (email === correctEmail && password === correctPassword) {
        alert("Login successful! Welcome Admin.");
        window.location.href = "admin.html";
      } else {
        alert("Invalid Email or Password! Please try again.");
      }
    });
  </script>
  <footer class="footer">
    <div class="footer1">
      <p>2026 Paw Care!</p>
    </div>
  </footer>
</body>

</html>
