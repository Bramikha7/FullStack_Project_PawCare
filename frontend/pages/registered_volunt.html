<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Volunteer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "poppins",sans-serif;
        }

        #one {
            display: flex;
            padding: 90px;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin: 50px;
        }

        .card {
            font-family: "poppins",sans-serif;
            text-align: start;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.9;
            width: 200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .nav_bar {
            background-color: #301d10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            color: #301d10;
            /* border: 1px solid #ccc; */
        }

        .nav_link {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav_link a {
            text-decoration: none;
            color: white;
        }

        .nav_link button {
            height: 25px;
            width: 60px;
            border-radius: 15px;
            border: 2px solid black;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo a {
            text-decoration: none;
            color: white;
        }

        .logo_img {
            border-radius: 50%;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: white;
        }

        .head {
            margin-top: 60px;
            text-align: center;
            color: #301d10;
            padding: 20px;
        }

        .footer {
            margin-top: 100px;
            background-color: #301d10;
            height: 100px;
            color: white;
        }

        .footer1 {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .nav_bar {
                flex-direction: row;
                justify-content: space-between;
                padding: 10px;
            }
            .nav_link {
                display: none;
                flex-direction: column;
                gap: 10px;
                align-items: center;
                padding: 10px 0;
                width: 100%;
            }
            .nav_link.active {
                display: flex;
            }
            .hamburger {
                display: flex !important;
            }
            #one {
                padding: 10px;
                margin: 20px 0;
            }
            .card {
                width: 90%;
            }
        }
    </style>
    <header>
        <nav class="nav_bar">
            <div class="logo">
                <img class="logo_img" src="../assets/Logo.png" alt="Logo Image" width="70px" height="70px" />
                <h2><a href="../pages/ngodashboard.html">Paw Care</a></h2>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav_link">
                <li><b><a href="../pages/ngoabout.html">About</a></b></li>
                <li><b><a href="../pages/registered_volunt.html">Registered Volunteer</a></b></li>
                <li><b><a href="../pages/report_case.html">Report Cases</a></b></li>
                <li><b><a href="../pages/completedcase.html">Completed Cases</a></b></li>
                <li><b><a href="../pages/contact_ngo.html">Contact</a></b></li>
            </ul>
        </nav>
    </header>
    <h1 class="head">Registered Volunteer</h1>
    <div id="one"></div>
    <footer class="footer">
        <div class="footer1">
            <p>2026 Paw Care!</p>
        </div>
    </footer>
    <script>
        function toggleMenu() {
            const navMenu = document.querySelector('.nav_link');
            navMenu.classList.toggle('active');
        }
    </script>
</body>
<script src="../js/registered_volunt.js"></script>

</html>
